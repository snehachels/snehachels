<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1614"/>
      <stop offset="100%" style="stop-color:#0f0d0c"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a87c"/>
      <stop offset="50%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#c49060"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="blur" in2="blur" operator="over"/>
    </filter>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>

    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#e8a87c" opacity="0.12"/>
    </pattern>

    <style>
      @keyframes slideRight {
        from { opacity: 0; transform: translateX(-30px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes expandLine {
        from { stroke-dashoffset: 120; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes expandLong {
        from { stroke-dashoffset: 800; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.04; }
        50% { opacity: 0.08; }
      }
      .name { opacity: 0; animation: slideRight 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards; }
      .role { opacity: 0; animation: slideRight 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards; }
      .tagline { opacity: 0; animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards; }
      .detail { opacity: 0; animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
      .d1 { animation-delay: 1.1s; }
      .d2 { animation-delay: 1.3s; }
      .d3 { animation-delay: 1.5s; }
      .short-line {
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: expandLine 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
      }
      .long-line {
        stroke-dasharray: 800;
        stroke-dashoffset: 800;
        animation: expandLong 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      }
      .orb { animation: breathe 6s ease-in-out infinite; }
      .orb2 { animation: breathe 8s ease-in-out infinite 2s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>
  <rect width="1200" height="400" filter="url(#grain)" opacity="0.6"/>

  <!-- Ambient orbs -->
  <circle class="orb" cx="950" cy="120" r="180" fill="#e8a87c" opacity="0.04" filter="url(#softGlow)"/>
  <circle class="orb2" cx="200" cy="350" r="140" fill="#d4a574" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Top accent line -->
  <line class="long-line" x1="0" y1="0.5" x2="1200" y2="0.5" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Vertical accent mark -->
  <line class="short-line" x1="100" y1="100" x2="100" y2="220" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>

  <!-- Name -->
  <text class="name" x="130" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="400" fill="#f2e8de" letter-spacing="-1">Sneha</text>

  <!-- Role -->
  <text class="role" x="132" y="198" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="17" fill="#e8a87c" letter-spacing="6">PRODUCT MANAGER</text>

  <!-- Divider -->
  <line class="long-line" x1="130" y1="230" x2="520" y2="230" stroke="#e8a87c" stroke-width="0.5" opacity="0.3"/>

  <!-- Tagline -->
  <text class="tagline" x="130" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#a89888" font-style="italic">Building things I'm curious about.</text>

  <!-- Right column details -->
  <g class="detail d1" transform="translate(700, 145)">
    <circle cx="0" cy="-4" r="3" fill="none" stroke="#e8a87c" stroke-width="1" opacity="0.6"/>
    <text x="16" y="0" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="14" fill="#8a7e74" letter-spacing="1">STRATEGY &amp; VISION</text>
  </g>

  <g class="detail d2" transform="translate(700, 185)">
    <circle cx="0" cy="-4" r="3" fill="none" stroke="#e8a87c" stroke-width="1" opacity="0.6"/>
    <text x="16" y="0" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="14" fill="#8a7e74" letter-spacing="1">USER-CENTERED THINKING</text>
  </g>

  <g class="detail d3" transform="translate(700, 225)">
    <circle cx="0" cy="-4" r="3" fill="none" stroke="#e8a87c" stroke-width="1" opacity="0.6"/>
    <text x="16" y="0" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="14" fill="#8a7e74" letter-spacing="1">CURIOSITY-DRIVEN BUILDER</text>
  </g>

  <!-- Corner decorations -->
  <g opacity="0.15">
    <line x1="1140" y1="340" x2="1170" y2="340" stroke="#e8a87c" stroke-width="1"/>
    <line x1="1170" y1="340" x2="1170" y2="370" stroke="#e8a87c" stroke-width="1"/>
  </g>
  <g opacity="0.15">
    <line x1="30" y1="30" x2="60" y2="30" stroke="#e8a87c" stroke-width="1"/>
    <line x1="30" y1="30" x2="30" y2="60" stroke="#e8a87c" stroke-width="1"/>
  </g>

  <!-- CTA pill -->
  <g class="detail d3" transform="translate(130, 330)">
    <rect x="0" y="-16" width="190" height="30" rx="15" fill="none" stroke="#e8a87c" stroke-width="0.8" opacity="0.4"/>
    <text x="95" y="3" text-anchor="middle" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="11" fill="#c49060" letter-spacing="2.5">OPEN TO CONNECT</text>
  </g>

  <!-- Bottom accent line -->
  <line class="long-line" x1="1200" y1="399.5" x2="0" y2="399.5" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
</svg>
